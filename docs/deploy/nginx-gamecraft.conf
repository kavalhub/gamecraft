# Nginx: игра под /gamecraft, лендинг на корне

Пример конфигурации для `local.game.local`, когда корень `/` отдаёт отдельный лендинг, а Laravel — только под `/gamecraft`.

```nginx
server {
    listen 443 ssl;
    server_name local.game.local;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Лендинг (другой проект)
    location / {
        root /var/www/landing/public;
        try_files $uri $uri/ /index.html;
    }

    # Статика и PHP Laravel (игра)
    location /gamecraft/ {
        alias /var/www/game-project/public/;
        try_files $uri $uri/ @gamecraft;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/game-project/public/index.php;
            fastcgi_param SCRIPT_NAME /gamecraft/index.php;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        }
    }

    location @gamecraft {
        rewrite ^/gamecraft/(.*)$ /gamecraft/index.php?$query_string last;
    }

    # WebSocket (если используется отдельный процесс на /ws)
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
```

## Переменные окружения Laravel

```env
APP_URL=https://local.game.local/gamecraft
GAME_BASE_PATH=/gamecraft
```

## После деплоя PHP

```bash
php artisan config:clear
php artisan octane:reload   # если Octane
```

## Проверка

| URL | Ожидание |
|-----|----------|
| `https://local.game.local/` | лендинг |
| `https://local.game.local/gamecraft` | вход в игру |
| `https://local.game.local/gamecraft/play` | клиент |
| `https://local.game.local/gamecraft/api/game/meta` | JSON meta |
| `https://local.game.local/gamecraft/js/game/game-paths.js` | 200 |

Если Octane слушает весь домен без nginx alias, настройте прокси:

```nginx
location /gamecraft/ {
    proxy_pass http://127.0.0.1:8000/gamecraft/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /gamecraft;
}
```

Убедитесь, что `TrustProxies` доверяет заголовкам от nginx при необходимости.
